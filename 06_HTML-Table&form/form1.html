<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Belajar form</title>
</head>
<body>
    <h1>Date Mahasiswa</h1>
    <fieldset>
        <legend>Data Mahasiswa :</legend>
    <form action="post">
        
        <label for="text">Nama Lengkap :</label>
        <input type="text" name="text" id="text" placeholder="Isi nama lengkap" size="30">
        <label for="text">Alamat Sekarang : </label>
        <input type="text" name="text" id="text" placeholder="Isi Alamat sekarang" size="30">
        <label for="date">Tanggal lahir :</label>
        <input type="date" name="date" id="date" min="1,1,2010" max="1,1,2000" size="30">
        <label for="jenis_kelamin">Jenis Kelamin :</label>
        <input type="radio" name="jenis_kelamin" id="jenis_kelamin" value="pria"><label for="pria">Pria</label>
        <input type="radio" name="jenis_kelamin" id="jenis_kelamin" value="wanita"><label for="wanita">Wanita</label>
        <select name="Agama" id="Agama">
        <option value="Islam">Islam</option>
        <option value="Kristen">Kristen</option>
        <option value="Hindu">Hindu</option>
        <option value="Budah">Budah</option></select>
        <textarea name="text" id="text" rows="4" cols="50" placeholder="Isi"></textarea>
     </fieldset>
    </form>
</body>
</html>
