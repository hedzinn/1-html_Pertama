<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan style 4</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @font-face {
            font-family: playfair;
            src: url(fonts/PlayfairDisplay-VariableFont_wght.ttf)format('truetype');
            font-display: swap;
            font-weight: normal;
            font-style: normal;
        }
        body{
            background-image: url(image/7.jpg);
            background-color: rgb(154 205 50 /50%);
            background-repeat: repeat;
            height: 100vh;
            background-size: cover 100%;
            background-position: center;
        }
        
        h1{
            font-family: playfair,sans-serif;
            font-size: 40px;
            padding: 40px;
            text-align: center;
            text-transform:capitalize;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-shadow: 2px 2px 3 rgb(74 132 7 /30%);
            text-decoration-color: yellowgreen;
            color: yellowgreen;
            
            
        }
        p{
            line-height: 50px;
            font-family: "Instrument Serif", serif;
            font-size: 20px;
            word-spacing: 16px;
            color: rgb(229, 235, 215);
            text-align: center;
        }
        span{
            text-decoration: line-through;
            text-decoration-color: rgb(103, 161, 5);
            color: rgb(106, 165, 42);
            text-decoration-thickness: 2px;
        }
        cite{
            display: block;
            text-align: center;
            color: rgba(233, 238, 224, 0.2);
            font-size: 15px;
            max-width: 300px;
            padding: 10px;
            border-top: 1px solid rgb(252, 240, 240);
            padding-top: 10px;
            margin: 13px auto 0 auto;
        }
        .kotak {
            border: 1px solid black;
            background-color: rgb(154 205 50 /30%);
            border-radius: 30px;
            height: 180px;
            width: 700px;
            margin: auto;
        }
    </style>
</head>
<body>
    <h1>Kata Bijak</h1>
    <blockquote>
        <div class="kotak">
        <p>Tidak perlu memaksakan diri untuk menjadi seseorang <span>yang</span> serba bisa<br>Cukup tekuni satu bidang yang paling membuatmu bahagia,<br> lalu jadilah orang hebat dalam bidang tersebut</p></div>
        <cite>-Zinn Nor-</cite>
    </blockquote>
</body> 
</html>
