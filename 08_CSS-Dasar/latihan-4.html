<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
    <style>
        body{
            background-image:linear-gradient( rgb(15 23 42 /0.50)), url(image/3729ec4aa0f88774203fb88ba049770c.webp);
            background-repeat: no-repeat;
            height: 100vh;
            background-color: rgb(0,0,0,0.45);
            background-size:cover;
            background-attachment: fixed;
            background-position: center;
            margin: 0;
        }
        h1{
            color: transparent;
            font-size: 50px;
            text-align: center;
            text-transform: uppercase;
            filter: drop-shadow(0 0 10px rgb(140 255 134 / 80%));
            font-style: italic;
            background-image: linear-gradient(to right,rgb(56, 56, 130)30%,rgba(100, 52, 136, 0.602));
            font-family: Arial, Helvetica, sans-serif;
            background-clip: text;
        }
        p{
            font-family: Arial, Helvetica, sans-serif;
            word-spacing: 20px;
            color: white;
            line-height: 40px;
            letter-spacing: 2px;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
        }
        span{
            text-decoration: line-through;
            color:rgb(247, 122, 122);
            text-decoration-thickness: 3px;
        }
        cite{
            display: block;
            text-align: center;
            font-size: 15px;
            letter-spacing: 5px;
            word-spacing: 5px;
            color: rgb(255, 254, 254);
        }
        .conten{
            border: 1px,solid,black;
            background-color: rgb(0,0,0,0.45);
            border-radius: 15px;
            box-shadow: 5px 5px 10px rgb(9, 9, 9);
        }
        .p2{
            font-style: italic;
            font-family: Arial, Helvetica, sans-serif;
            color: rgb(69, 69, 70);
        }
    </style>
</head>
<body>
    <h1>face runtuh</h1>
    <blockquote>
        <div class="conten">
        <p>"Tak Perlu Khawatir, ku hanya <span>terluka</span>. <br>Terbiasa tuk pura-pura tertawa. <br>Namun bolehkah sekali saja ku menangis? <br>sebelum kembali membohongi diri."</p>
         </div>
    </blockquote>
    <p class="p2">-Muzin Noor</p>
</body>
</html>
