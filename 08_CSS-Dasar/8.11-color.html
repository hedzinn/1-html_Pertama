<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CSS 11</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Outfit:wght@100..900&family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap');
        @font-face {
            font-family: playfair;
            src: url(fonts/PlayfairDisplay-VariableFont_wght.ttf)format('truetype');
            font-display: swap;
            font-weight: normal;
            font-style: normal;
        }
        body{
            background-color: #534B2D;
        }
        
        h1{
            font-family: playfair,sans-serif;
            font-size: 40px;
            padding: 40px;
            text-align: center;
            text-transform:capitalize;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-shadow: 2px 2px 3 rgb(74 132 7 /30%);
            text-decoration-color: yellowgreen;
            color: yellowgreen;
            
            
        }
        p{
            line-height: 50px;
            font-family: "Instrument Serif", serif;
            font-size: 20px;
            word-spacing: 16px;
            color: rgb(128, 179, 27);
            text-align: center;
        }
        span{
            text-decoration: line-through;
            text-decoration-color: rgb(103, 161, 5);
            color: rgb(106, 165, 42);
            text-decoration-thickness: 2px;
        }
        cite{
            display: block;
            text-align: center;
            color: rgb(154 205 50 /20%);
            font-size: 15px;

        }
    </style>
</head>
<body>
    <h1>Kata Bijak</h1>
    <blockquote>
        <p>Tidak perlu memaksakan diri untuk menjadi seseorang <span>yang</span> serba bisa<br>Cukup tekuni satu bidang yang paling membuatmu bahagia,<br> lalu jadilah orang hebat dalam bidang tersebut</p>
        <cite>-Zinn Nor-</cite>
    </blockquote>
</body> 
</html>
