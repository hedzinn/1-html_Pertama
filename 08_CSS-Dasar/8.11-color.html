<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
    <style>
        body{
            background-color: #AA3122;
        }
        h1{
            color: rgb(255, 255, 253);
            font-size: 50px;
            text-align: center;
            text-transform: uppercase;
            font-style: italic;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: rgb(247, 247, 247);
            text-decoration-skip-ink: none;
            text-shadow: 0px -4px 5px rgb(255, 255, 255);
        }
        p{
            font-family: Arial, Helvetica, sans-serif;
            word-spacing: 20px;
            color: white;
            line-height: 40px;
            letter-spacing: 2px;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
        }
        span{
            text-decoration: line-through;
            color:rgb(247, 122, 122);
            text-decoration-thickness: 3px;
        }
        cite{
            display: block;
            text-align: center;
            font-size: 15px;
            letter-spacing: 5px;
            word-spacing: 5px;
            color: rgb(255, 254, 254);
        }
    </style>
</head>
<body>
    <h1>face runtuh</h1>
    <blockquote>
        <p>"Tak Perlu Khawatir, ku hanya <span>terluka</span>. <br>Terbiasa tuk pura-pura tertawa. <br>Namun bolehkah sekali saja ku menangis? <br>sebelum kembali membohongi diri."</p>
        <cite>-Muzin Noor</cite>
    </blockquote>
</body>
</html>
