<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Latihan 2</title>
    <style>
        h1{
            color: rgb(12, 12, 10);
            font-size: 50px;
            text-align: center;
            text-transform: uppercase;
            font-style: italic;
            font-family: Arial, Helvetica, sans-serif;
            text-decoration: underline;
            text-decoration-style: wavy;
            text-decoration-color: gray;
            text-decoration-skip-ink: none;
            text-shadow: 2px 5px 5px gray;
        }
        p{
            font-family: Arial, Helvetica, sans-serif;
            word-spacing: 20px;
            line-height: 40px;
            letter-spacing: 2px;
            font-size: 20px;
            text-align: center;
            font-weight: bold;
        }
        span{
            text-decoration: line-through;
            color:rgb(133, 134, 134);
            text-decoration-thickness: 3px;
        }
        cite{
            display: block;
            text-align: center;
            font-size: 15px;
            letter-spacing: 5px;
            word-spacing: 5px;
            color: gray;
        }
    </style>
</head>
<body>
    <h1>face runtuh</h1>
    <blockquote>
        <p>"Tak Perlu Khawatir, ku hanya <span>terluka</span>. <br>Terbiasa tuk pura-pura tertawa. <br>Namun bolehkah sekali saja ku menangis? <br>sebelum kembali membohongi diri."</p>
        <cite>-Muzin Noor</cite>
    </blockquote>
</body>
</html>
